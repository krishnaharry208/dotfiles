[colors]
# Main floating bar background
background = #cc1a1b26  
border = #3b4261

foreground = #a9b1d6
primary = #7aa2f7
secondary = #bb9af7
alert = #f7768e
disabled = #565f89
transparent = #00000000

# Icon Accents
vol-accent = #9ece6a  
net-accent = #e0af68  
bat-accent = #b4f9f8  

[bar/example]
width = 100%
height = 25pt
radius = 14
fixed-center = true
bottom = false

wm-restack = generic
override-redirect = false

line-size = 0pt
background = ${colors.background}
foreground = ${colors.foreground}

border-size = 1.5pt
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 1

# --- Typography ---
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=13;4" 
font-2 = "JetBrainsMono Nerd Font:size=18;5" 

# --- Module Layout ---
modules-left = xworkspaces 
modules-center = title
modules-right = date volume network battery power

cursor-click = pointer
enable-ipc = true

# =========================
# LEFT: WORKSPACES & TITLE
# =========================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.secondary}
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

; --- Add these lines ---
label-separator = |
label-separator-foreground = ${colors.disabled}RR

[module/title]
type = internal/xwindow
label = " |  %title%"
label-maxlen = 50
label-empty = " |  Desktop"
label-foreground = ${colors.disabled} 

# =========================
# CENTER: DATE
# =========================

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = "󱑂 %date%"
label-foreground = ${colors.primary}

# =========================
# RIGHT: SYSTEM ICONS
# =========================

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 0

click-left = ~/.config/polybar/scripts/volume.sh mute
scroll-up = ~/.config/polybar/scripts/volume.sh up
scroll-down = ~/.config/polybar/scripts/volume.sh down

format = <label>
label = %{F#9ece6a}%output%

[module/network]
type = internal/network
interface = wlan0
interval = 0
format-connected = <label-connected>
label-connected = " %{F#e0af68}%{F-} %essid% "
label-disconnected = " %{F#565f89}󰖪%{F-} "

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC0

; --- Icons and Formatting ---

; Available tags: <label-charging> (default), <bar-capacity>, <ramp-capacity>, <animation-charging>
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

; Available tokens: %percentage%% (default), %time%, %consumption%
label-full =   %percentage%%
label-full-foreground = ${colors.primary}

; Icons for discharging state
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.primary}

; Animation for charging state
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750
animation-charging-foreground = ${colors.secondary}

[module/power]
type = custom/text
label = "  "
label-foreground = ${colors.alert}
click-left = ~/.config/polybar/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true